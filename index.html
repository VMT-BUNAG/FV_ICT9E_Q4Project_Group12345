<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
</head>

<body>
    <div class="container">
        <div class="col-md-4 mx-auto border p-4 bg-white login-box">

            <h2 class="text-center">Login Form</h2>

            <label for="username">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter here">

            <br>

            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter here">

            <div class="text-end mt-3">
                <a href="#" onclick="forgotDetails()" style="font-size: 14px; color:#d6336c;"> Forgot Username /
                    Password? </a>
            </div>

            <p id="answer" class="text-danger"></p>


            <input type="button" id="loginBTN" value="Login" class="btn pink w-100 mb-2" onclick="authenticate()">

            <input type="reset" value="Cancel" class="btn btn-secondary w-100">

        </div>
    </div>

    <script>

        let attempt_counter = 0;

        function authenticate() {

            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;

            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";

            while (attempt_counter < 3) {


                if (username === "Sir Renn" && password === "1234") {
                    alert(granted);
                    attempt_counter = 0;

                    document.getElementById("answer").innerHTML = "";

                    window.location.href = "notebooks.html";

                    break;
                }

                else {
                    attempt_counter++;

                    document.getElementById("answer").innerHTML =
                        "Incorrect username or password. Attempt " + attempt_counter + " of 3";

                    break;
                }
            }

            if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true;
            }
        }
    </script>

</body>

</html>
